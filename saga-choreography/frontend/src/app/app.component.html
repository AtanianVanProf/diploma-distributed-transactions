<header class="header">
  <h1 class="header__title">SAGA Choreography Demo — Event-Driven Coordination</h1>
  <button
    class="header__reset-btn"
    (click)="onResetDatabase()"
    [disabled]="resetting()">
    @if (resetting()) {
      Resetting...
    } @else {
      Reset DB
    }
  </button>
</header>

<main class="dashboard">
  <!-- Row 1: 3-column service panels -->
  <section class="dashboard__row dashboard__row--panels">
    <app-inventory-panel />
    <app-payment-panel />
    <app-order-panel />
  </section>

  <!-- Row 2: Saga Execution Panel -->
  <section class="dashboard__row">
    <app-saga-execution-panel />
  </section>

  <!-- Row 3: Order Form -->
  <section class="dashboard__row">
    <app-order-form
      (beforeSubmit)="onBeforeSubmit($event)"
      (orderSubmitted)="onOrderSubmitted($event)"
      (orderError)="onOrderError($event)" />
  </section>

  <!-- Row 4: Polling Indicator -->
  @if (polling()) {
    <section class="dashboard__row">
      <div class="polling-indicator">
        <span class="polling-spinner"></span>
        Processing order... Waiting for saga completion.
      </div>
    </section>
  }

  <!-- Row 5: Transaction Result -->
  <section class="dashboard__row">
    <app-transaction-result
      [result]="resultType()"
      [beforeState]="beforeState()"
      [afterState]="afterState()"
      [sagaExecution]="sagaExecution()"
      [orderId]="currentOrderId()"
      [failureReason]="failureReason()" />
  </section>

  <!-- Row 6: Order History -->
  <section class="dashboard__row">
    <app-order-history />
  </section>
</main>
