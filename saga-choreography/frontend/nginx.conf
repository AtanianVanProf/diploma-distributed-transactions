server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Order Service endpoints (saga initiator + read model)
    location /api/orders {
        resolver 127.0.0.11 valid=10s;
        set $order_backend http://order-service:8101;
        proxy_pass $order_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Demo endpoints (reset)
    location /api/demo {
        resolver 127.0.0.11 valid=10s;
        set $order_backend http://order-service:8101;
        proxy_pass $order_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Inventory Service endpoints (read-only)
    location /api/products {
        resolver 127.0.0.11 valid=10s;
        set $inventory_backend http://inventory-service:8102;
        proxy_pass $inventory_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Payment Service endpoints (read-only)
    location /api/customers {
        resolver 127.0.0.11 valid=10s;
        set $payment_backend http://payment-service:8103;
        proxy_pass $payment_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Angular SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
