server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy — forward to Spring Boot backend
    # Uses a variable so nginx doesn't fail at startup if the backend is unreachable
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend http://monolith-app:8080;
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Angular SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
