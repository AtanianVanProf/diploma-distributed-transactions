services:
  monolith-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: monolith
      POSTGRES_USER: monolith
      POSTGRES_PASSWORD: monolith
    ports:
      - "5432:5432"
    volumes:
      - monolith-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monolith"]
      interval: 5s
      timeout: 5s
      retries: 5

  monolith-app:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://monolith-db:5432/monolith
      SPRING_DATASOURCE_USERNAME: monolith
      SPRING_DATASOURCE_PASSWORD: monolith
    depends_on:
      monolith-db:
        condition: service_healthy

volumes:
  monolith-db-data:
