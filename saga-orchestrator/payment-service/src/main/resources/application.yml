server:
  port: 8093

spring:
  datasource:
    url: jdbc:postgresql://localhost:5453/payment_db
    username: payment
    password: payment
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
