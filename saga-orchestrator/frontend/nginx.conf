server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Orchestrator Service endpoints
    location /api/orchestrator {
        resolver 127.0.0.11 valid=10s;
        set $orchestrator_backend http://orchestrator-service:8094;
        proxy_pass $orchestrator_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Order Service endpoints (read-only from frontend)
    location /api/orders {
        resolver 127.0.0.11 valid=10s;
        set $order_backend http://order-service:8091;
        proxy_pass $order_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Inventory Service endpoints
    location /api/products {
        resolver 127.0.0.11 valid=10s;
        set $inventory_backend http://inventory-service:8092;
        proxy_pass $inventory_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Payment Service endpoints
    location /api/customers {
        resolver 127.0.0.11 valid=10s;
        set $payment_backend http://payment-service:8093;
        proxy_pass $payment_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/payments {
        resolver 127.0.0.11 valid=10s;
        set $payment_backend http://payment-service:8093;
        proxy_pass $payment_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Angular SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
