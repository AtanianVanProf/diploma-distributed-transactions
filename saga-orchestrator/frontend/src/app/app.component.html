<header class="header">
  <h1 class="header__title">SAGA Orchestrator Demo — Distributed Transactions Solved</h1>
  <button
    class="header__reset-btn"
    (click)="onResetDatabase()"
    [disabled]="resetting()">
    @if (resetting()) {
      Resetting...
    } @else {
      Reset DB
    }
  </button>
</header>

<main class="dashboard">
  <!-- Row 1: 3-column service panels -->
  <section class="dashboard__row dashboard__row--panels">
    <app-inventory-panel />
    <app-payment-panel />
    <app-order-panel />
  </section>

  <!-- Row 2: Saga Execution Panel -->
  <section class="dashboard__row">
    <app-saga-execution-panel />
  </section>

  <!-- Row 3: Order Form -->
  <section class="dashboard__row">
    <app-order-form
      (beforeSubmit)="onBeforeSubmit($event)"
      (orderPlaced)="onOrderPlaced($event)"
      (orderFailed)="onOrderFailed($event)" />
  </section>

  <!-- Row 4: Transaction Result -->
  <section class="dashboard__row">
    <app-transaction-result
      [result]="resultType()"
      [orderResponse]="orderResponse()"
      [errorResponse]="errorResponse()"
      [beforeState]="beforeState()"
      [afterState]="afterState()"
      [sagaExecution]="sagaExecution()" />
  </section>
</main>
