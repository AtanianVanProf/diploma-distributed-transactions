server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5441/order_db
    username: order
    password: order
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

services:
  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
  payment:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
